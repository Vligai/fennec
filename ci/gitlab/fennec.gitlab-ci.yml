spec:
  inputs:
    fennec_api_key:
      description: "Fennec API key (set as a masked CI/CD variable)"
      type: string
    scan_mode:
      description: "diff or full"
      default: "diff"
      type: string
    fail_on:
      description: "blocking | any | none"
      default: "blocking"
      type: string
    post_comment:
      description: "Post summary comment to MR"
      default: "true"
      type: string

---

fennec-scan:
  stage: test
  image: python:3.11-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  variables:
    FENNEC_API_KEY: $[[ inputs.fennec_api_key ]]
    INPUT_SCAN_MODE: $[[ inputs.scan_mode ]]
    INPUT_FAIL_ON: $[[ inputs.fail_on ]]
    INPUT_POST_COMMENT: $[[ inputs.post_comment ]]
  before_script:
    - pip install fennec --quiet
  script:
    - |
      if [ "${INPUT_SCAN_MODE}" = "diff" ]; then
        fennec scan --diff --format sarif --output fennec-results.sarif --fail-on "${INPUT_FAIL_ON}"
      else
        fennec scan --full --format sarif --output fennec-results.sarif --fail-on "${INPUT_FAIL_ON}"
      fi
    - |
      if [ "${INPUT_POST_COMMENT}" = "true" ] && [ -n "${CI_MERGE_REQUEST_IID:-}" ]; then
        python -m fennec.ci.gitlab \
          --sarif fennec-results.sarif \
          --token "${CI_JOB_TOKEN}" \
          --project-id "${CI_PROJECT_ID}" \
          --mr-iid "${CI_MERGE_REQUEST_IID}"
      fi
  artifacts:
    paths:
      - fennec-results.sarif
    when: always
